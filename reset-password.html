<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayNexus — Update Password</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="page-wrapper">
    <div class="auth-page">
      <div class="auth-card fade-in">
        <div class="auth-logo">
          <div class="logo-icon-large"><img src="https://i.postimg.cc/dQ6H8VTb/Chat-GPT-Image-Apr-22-2026-02-25-57-AM-photoaidcom-cropped.png" alt="PayNexus Logo" /></div>
          <div class="auth-title">Update Password</div>
          <div class="auth-sub">Choose a new secure password for your account</div>
        </div>

        <form class="auth-form" id="form-reset">
          <div class="form-group">
            <label class="form-label" for="reset-password">New Password</label>
            <input type="password" id="reset-password" class="form-control" placeholder="Min. 6 characters" required minlength="6" />
          </div>
          <div class="form-error" id="reset-error"></div>
          <button type="submit" class="btn btn-primary btn-full" id="btn-reset">Update Password</button>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      document.getElementById('form-reset').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-reset');
        const errorEl = document.getElementById('reset-error');
        const password = document.getElementById('reset-password').value;

        errorEl.classList.remove('show');
        btn.innerHTML = '<span class="spinner"></span> Updating...';
        btn.disabled = true;

        const { error } = await supabaseClient.auth.updateUser({ password });

        if (error) {
          errorEl.textContent = error.message;
          errorEl.classList.add('show');
          btn.innerHTML = 'Update Password';
          btn.disabled = false;
        } else {
          showToast('Password updated! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'login.html', 2000);
        }
      });
    });
  </script>
</body>
</html>
