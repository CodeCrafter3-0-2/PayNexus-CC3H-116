<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayNexus — Approve Payments</title>
  <meta name="description" content="Approve or reject your pending split payment charges." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .main-content { padding: 1.5rem 0 4rem; }
    .approve-card {
      margin-bottom: 1.5rem;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      border-radius: var(--radius-xl);
      overflow: hidden;
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      box-shadow: var(--shadow-md);
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s;
    }
    .approve-card:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.1); border-color: var(--primary-glow); }
    .approve-card-header {
      padding: 1.25rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; border-bottom: 1px solid var(--glass-border);
    }
    .approve-card-body { padding: 1.25rem 1.5rem; }
    .approve-amount { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; }
    .approve-actions { display: flex; gap: .75rem; margin-top: 1rem; }
    .split-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: .75rem; margin-bottom: 1rem; }
    .split-info-item { background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); padding: .6rem .9rem; }
    .split-info-label { font-size: .7rem; color: var(--text-400); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
    .split-info-value { font-size: .95rem; font-weight: 700; margin-top: .15rem; }
    .members-split { display: flex; flex-direction: column; gap: .4rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <div class="page-wrapper">
    <nav class="navbar">
      <a href="index.html" class="nav-logo"><div class="logo-icon">💸</div><span class="logo-text">PayNexus</span></a>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="groups.html" class="nav-link">Groups</a>
        <a href="pay.html" class="nav-link" id="nav-pay">Pay</a>
        <a href="approve.html" class="nav-link active">Approvals</a>
        <a href="analytics.html" class="nav-link">Analytics</a>
      </div>
      <div class="nav-user">
        <button class="btn-icon" id="theme-toggle" title="Toggle Theme">??</button>
        <div class="nav-avatar" id="nav-avatar">?</div>
        <button class="btn-logout" id="btn-logout">Logout</button>
      </div>
    </nav>

    <div class="container main-content">
      <div class="page-header">
        <h1 class="section-title">✅ Payment Approvals</h1>
        <p class="section-sub">Review and approve your pending split charges</p>
      </div>

      <div class="tab-bar" style="max-width:400px;">
        <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">⏳ Pending</button>
        <button class="tab-btn" id="tab-approved" onclick="switchTab('approved')">✅ Approved</button>
        <button class="tab-btn" id="tab-all-tx" onclick="switchTab('all')">📋 All Transactions</button>
      </div>

      <div id="tab-pending-content">
        <div id="pending-list">
          <div class="empty-state"><div class="spinner"></div><p>Loading...</p></div>
        </div>
      </div>

      <div id="tab-approved-content" style="display:none;">
        <div id="approved-list">
          <div class="empty-state"><div class="spinner"></div><p>Loading...</p></div>
        </div>
      </div>

      <div id="tab-all-content" style="display:none;">
        <div id="all-tx-list">
          <div class="empty-state"><div class="spinner"></div><p>Loading...</p></div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- PIN Entry Modal -->
  <div class="modal" id="pin-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
    <div class="modal-content" style="background:var(--glass); border:1px solid var(--glass-border); padding:2rem; border-radius:var(--radius-lg); max-width:400px; width:90%; text-align:center;">
      <h3 style="margin-bottom:1rem;">Enter Transaction PIN</h3>
      <p style="font-size:0.9rem; color:var(--text-400); margin-bottom:1.5rem;">Please enter your 6-digit PIN to approve this transaction.</p>
      <input type="password" id="approve-pin-input" class="form-control" placeholder="••••••" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" style="text-align:center; font-size:1.5rem; letter-spacing:0.5rem; margin-bottom:1.5rem;" />
      <div class="form-error" id="pin-error"></div>
      <div style="display:flex; gap:1rem; justify-content:center;">
        <button class="btn btn-outline" id="btn-cancel-pin">Cancel</button>
        <button class="btn btn-accent" id="btn-submit-pin">Verify & Approve</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/approve.js"></script>
</body>
</html>
